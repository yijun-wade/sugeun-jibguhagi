name: Daily Real Estate Briefing

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 오전 7시 KST (22:00 UTC)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/generate-briefing.mjs

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Regenerate RSS
        run: node scripts/generate-rss.mjs

      - name: Commit if new briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/briefings/ public/sitemap.xml public/rss.xml
          git diff --cached --quiet || git commit -m "chore: daily briefing $(date -u +'%Y-%m-%d')"
          git push
